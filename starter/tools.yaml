sources:
  # MySQL Database Source for Product Pricing
  products:
    kind: mysql
    host: ${MYSQL_HOST}
    port: ${MYSQL_PORT:3306}
    user: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    database: betty

tools:
  # Tool to query product pricing from MySQL database
  get_product_price:
    kind: mysql-sql
    source: products
    name: "get-product-price-tool"
    description: "Query the product pricing database for a specific bird product's price."
    parameters:
      - name: product_name
        type: string
        description: "The name of the bird product to look up (supports partial matching)"
    statement:
      SELECT 
        product_name, 
        price 
      FROM 
        products 
      WHERE 
        LOWER(product_name) LIKE CONCAT('%', LOWER(?), '%') 
      ORDER BY 
        product_name ASC;
